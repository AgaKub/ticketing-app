<h1>{{ event.name }}</h1>

<p>{{ event.venue }}</p>
<p>{{ event.date }}</p>

<h2>Tickets</h2>

{% for ticket in tickets %}
    <div>
        <p>{{ ticket.name }}</p>
        <p>Price: {{ ticket.price }}</p>
        <p>Available: {{ ticket.quantity }}</p>

        <button>Buy</button>
    </div>
{% endfor %}
