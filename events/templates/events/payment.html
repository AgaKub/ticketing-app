<h1>Order Summary</h1>

{% for item in selections %}
    <p>{{ item.qty }} × {{ item.ticket }} (£{{ item.price }}) = £{{ item.subtotal }}</p>
{% endfor %}

<br>

<p><strong>Total: £{{ total }}</strong></p>

<br>

<p>Email: {{ email }}</p>

<!-- Debug (remove in production) -->

<p>Order ID debug: {{ order.id }}</p>

<br>

<a href="/pay/{{ order.id }}/">Pay Now</a>
